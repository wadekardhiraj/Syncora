name: syncora
description: Reading Room / Library Fee Management App - Flutter + Firebase SaaS
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  firebase_firestore: ^4.13.0
  cloud_firestore: ^4.13.0
  provider: ^6.0.0
  get_it: ^7.6.0
  flutter_spinkit: ^5.2.0
  fl_chart: ^0.66.0
  cupertino_icons: ^1.0.2
  intl: ^0.18.1
  shared_preferences: ^2.2.0
  connectivity_plus: ^5.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  path_provider: ^2.1.0
  logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter:
    sdk: flutter
  mockito: ^5.4.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
